name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging

    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: ${{ vars.AUTH_URL }}
      MONGODB_DB: ${{ secrets.MONGODB_DB }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print ref and commit
        run: |
          echo "ref=$GITHUB_REF"
          echo "sha=$GITHUB_SHA"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Pull Vercel environment
        run: npx vercel@latest pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: npx vercel@latest build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: npx vercel@latest deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
