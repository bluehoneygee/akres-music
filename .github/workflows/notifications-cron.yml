name: Notifications Cron

on:
  schedule:
    # Daily morning reminder at 07:00 WIB (00:00 UTC)
    - cron: "0 0 * * *"
    # T-3h reminder checker every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Run target environment"
        required: true
        default: all
        type: choice
        options:
          - all
          - staging
          - production

jobs:
  run-staging:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.target == 'all' || github.event.inputs.target == 'staging' }}
    name: Run Staging Notifications
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Debug env wiring (staging)
        env:
          AUTH_URL: ${{ vars.AUTH_URL }}
          APP_URL: ${{ vars.APP_URL }}
          AUTH_URL_SECRET: ${{ secrets.AUTH_URL }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: |
          if [ -n "$AUTH_URL" ]; then
            echo "AUTH_URL: set"
          else
            echo "AUTH_URL: missing"
          fi
          if [ -n "$APP_URL" ]; then
            echo "APP_URL: set"
          else
            echo "APP_URL: missing"
          fi
          if [ -n "$AUTH_URL_SECRET" ]; then
            echo "AUTH_URL secret: set"
          else
            echo "AUTH_URL secret: missing"
          fi
          if [ -n "$APP_URL_SECRET" ]; then
            echo "APP_URL secret: set"
          else
            echo "APP_URL secret: missing"
          fi
          if [ -n "$CRON_SECRET" ]; then
            echo "CRON_SECRET: set"
          else
            echo "CRON_SECRET: missing"
          fi
          if [ -n "$VERCEL_BYPASS_TOKEN" ]; then
            echo "VERCEL_BYPASS_TOKEN: set"
          else
            echo "VERCEL_BYPASS_TOKEN: missing (staging preview may return 401)"
          fi
      - name: Trigger notification scheduler (staging)
        env:
          AUTH_URL: ${{ vars.AUTH_URL }}
          APP_URL: ${{ vars.APP_URL }}
          AUTH_URL_SECRET: ${{ secrets.AUTH_URL }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          CRON_EXPR: ${{ github.event.schedule }}
        run: |
          BASE_URL="${AUTH_URL:-${APP_URL:-${AUTH_URL_SECRET:-$APP_URL_SECRET}}}"
          if [ -z "$BASE_URL" ]; then
            echo "No base URL found in vars/secrets AUTH_URL or APP_URL for staging environment"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not set for staging environment"
            exit 1
          fi
          MODE="all"
          if [ "$CRON_EXPR" = "0 0 * * *" ]; then
            MODE="morning"
          fi
          if [ "$CRON_EXPR" = "*/15 * * * *" ]; then
            MODE="preclass3h"
          fi
          REQUEST_URL="$BASE_URL/api/notifications/run?mode=$MODE"
          if [ -n "$VERCEL_BYPASS_TOKEN" ]; then
            REQUEST_URL="$REQUEST_URL&x-vercel-protection-bypass=$VERCEL_BYPASS_TOKEN&x-vercel-set-bypass-cookie=true"
          fi
          curl --fail-with-body --show-error --silent \
            -X POST "$REQUEST_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"

  run-production:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'production') }}
    name: Run Production Notifications
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Debug env wiring (production)
        env:
          AUTH_URL: ${{ vars.AUTH_URL }}
          APP_URL: ${{ vars.APP_URL }}
          AUTH_URL_SECRET: ${{ secrets.AUTH_URL }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$AUTH_URL" ]; then
            echo "AUTH_URL: set"
          else
            echo "AUTH_URL: missing"
          fi
          if [ -n "$APP_URL" ]; then
            echo "APP_URL: set"
          else
            echo "APP_URL: missing"
          fi
          if [ -n "$AUTH_URL_SECRET" ]; then
            echo "AUTH_URL secret: set"
          else
            echo "AUTH_URL secret: missing"
          fi
          if [ -n "$APP_URL_SECRET" ]; then
            echo "APP_URL secret: set"
          else
            echo "APP_URL secret: missing"
          fi
          if [ -n "$CRON_SECRET" ]; then
            echo "CRON_SECRET: set"
          else
            echo "CRON_SECRET: missing"
          fi
      - name: Trigger notification scheduler (production)
        env:
          AUTH_URL: ${{ vars.AUTH_URL }}
          APP_URL: ${{ vars.APP_URL }}
          AUTH_URL_SECRET: ${{ secrets.AUTH_URL }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_EXPR: ${{ github.event.schedule }}
        run: |
          BASE_URL="${AUTH_URL:-${APP_URL:-${AUTH_URL_SECRET:-$APP_URL_SECRET}}}"
          if [ -z "$BASE_URL" ]; then
            echo "No base URL found in vars/secrets AUTH_URL or APP_URL for production environment"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not set for production environment"
            exit 1
          fi
          MODE="all"
          if [ "$CRON_EXPR" = "0 0 * * *" ]; then
            MODE="morning"
          fi
          if [ "$CRON_EXPR" = "*/15 * * * *" ]; then
            MODE="preclass3h"
          fi
          curl --fail-with-body --show-error --silent \
            -X POST "$BASE_URL/api/notifications/run?mode=$MODE" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
