name: Notifications Morning Reminder

on:
  schedule:
    # Daily morning reminder at 08:00 WIB (01:00 UTC)
    # Note: GitHub Actions cron may be delayed or skipped on free tier
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Run target environment"
        required: true
        default: all
        type: choice
        options:
          - all
          - staging
          - production
      force:
        description: "Force run outside the normal reminder window"
        required: false
        default: false
        type: boolean

jobs:
  run-staging:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'staging') }}
    name: Run Staging Notifications
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Debug env wiring (staging)
        env:
          AUTH_URL: ${{ vars.AUTH_URL }}
          APP_URL: ${{ vars.APP_URL }}
          AUTH_URL_SECRET: ${{ secrets.AUTH_URL }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: |
          if [ -n "$AUTH_URL" ]; then
            echo "AUTH_URL: set"
          else
            echo "AUTH_URL: missing"
          fi
          if [ -n "$APP_URL" ]; then
            echo "APP_URL: set"
          else
            echo "APP_URL: missing"
          fi
          if [ -n "$AUTH_URL_SECRET" ]; then
            echo "AUTH_URL secret: set"
          else
            echo "AUTH_URL secret: missing"
          fi
          if [ -n "$APP_URL_SECRET" ]; then
            echo "APP_URL secret: set"
          else
            echo "APP_URL secret: missing"
          fi
          if [ -n "$CRON_SECRET" ]; then
            echo "CRON_SECRET: set"
          else
            echo "CRON_SECRET: missing"
          fi
          if [ -n "$VERCEL_BYPASS_TOKEN" ]; then
            echo "VERCEL_BYPASS_TOKEN: set"
          else
            echo "VERCEL_BYPASS_TOKEN: missing (staging preview may return 401)"
          fi
      - name: Trigger notification scheduler (staging)
        env:
          AUTH_URL: ${{ vars.AUTH_URL }}
          APP_URL: ${{ vars.APP_URL }}
          AUTH_URL_SECRET: ${{ secrets.AUTH_URL }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          CRON_EXPR: ${{ github.event.schedule }}
          FORCE_RUN: ${{ github.event.inputs.force }}
        run: |
          BASE_URL="${AUTH_URL:-${APP_URL:-${AUTH_URL_SECRET:-$APP_URL_SECRET}}}"
          if [ -z "$BASE_URL" ]; then
            echo "No base URL found in vars/secrets AUTH_URL or APP_URL for staging environment"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not set for staging environment"
            exit 1
          fi
          MODE="morning"
          REQUEST_URL="$BASE_URL/api/notifications/run?mode=$MODE&debug=true"
          if [ "$FORCE_RUN" = "true" ]; then
            REQUEST_URL="$REQUEST_URL&force=true"
          fi
          if [ -n "$VERCEL_BYPASS_TOKEN" ]; then
            REQUEST_URL="$REQUEST_URL&x-vercel-protection-bypass=$VERCEL_BYPASS_TOKEN&x-vercel-set-bypass-cookie=true"
          fi
          echo "Calling: $REQUEST_URL"
          RESPONSE=$(curl --fail-with-body --show-error --silent \
            -X POST "$REQUEST_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"

  run-production:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.target == 'all' || github.event.inputs.target == 'production' }}
    name: Run Production Notifications
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Debug env wiring (production)
        env:
          AUTH_URL: ${{ vars.AUTH_URL }}
          APP_URL: ${{ vars.APP_URL }}
          AUTH_URL_SECRET: ${{ secrets.AUTH_URL }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$AUTH_URL" ]; then
            echo "AUTH_URL: set"
          else
            echo "AUTH_URL: missing"
          fi
          if [ -n "$APP_URL" ]; then
            echo "APP_URL: set"
          else
            echo "APP_URL: missing"
          fi
          if [ -n "$AUTH_URL_SECRET" ]; then
            echo "AUTH_URL secret: set"
          else
            echo "AUTH_URL secret: missing"
          fi
          if [ -n "$APP_URL_SECRET" ]; then
            echo "APP_URL secret: set"
          else
            echo "APP_URL secret: missing"
          fi
          if [ -n "$CRON_SECRET" ]; then
            echo "CRON_SECRET: set"
          else
            echo "CRON_SECRET: missing"
          fi
      - name: Trigger notification scheduler (production)
        env:
          AUTH_URL: ${{ vars.AUTH_URL }}
          APP_URL: ${{ vars.APP_URL }}
          AUTH_URL_SECRET: ${{ secrets.AUTH_URL }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_EXPR: ${{ github.event.schedule }}
          FORCE_RUN: ${{ github.event.inputs.force }}
        run: |
          BASE_URL="${AUTH_URL:-${APP_URL:-${AUTH_URL_SECRET:-$APP_URL_SECRET}}}"
          if [ -z "$BASE_URL" ]; then
            echo "No base URL found in vars/secrets AUTH_URL or APP_URL for production environment"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not set for production environment"
            exit 1
          fi
          MODE="morning"
          REQUEST_URL="$BASE_URL/api/notifications/run?mode=$MODE&debug=true"
          if [ "$FORCE_RUN" = "true" ]; then
            REQUEST_URL="$REQUEST_URL&force=true"
          fi
          echo "Calling: $REQUEST_URL"
          RESPONSE=$(curl --fail-with-body --show-error --silent \
            -X POST "$REQUEST_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"
