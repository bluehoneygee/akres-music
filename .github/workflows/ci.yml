name: CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AUTH_SECRET: ci-build-secret-do-not-use-in-runtime
      AUTH_URL: http://localhost:3000
      MONGODB_DB: akres_music_ci
      MONGODB_URI: mongodb://127.0.0.1:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
