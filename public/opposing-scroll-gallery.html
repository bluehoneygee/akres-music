<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opposing Scroll Gallery</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        background: #fff;
        font-family: Arial, sans-serif;
      }

      .page {
        min-height: 100vh;
        background: #fff;
      }

      .gallery-wrapper {
        display: flex;
        align-items: flex-start;
        gap: 2vw;
        padding: 2vw;
        overflow: hidden;
        height: 100vh;
        position: relative;
      }

      .col {
        flex: 1;
        display: flex;
        flex-direction: column;
        will-change: transform;
      }

      .card {
        width: 28vw;
        height: 28vw;
        border-radius: 20px;
        overflow: hidden;
        margin-bottom: 4vw;
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      h1 {
        margin: 0;
        padding: 1.5rem 0 2rem;
        text-align: center;
        font-family: Georgia, serif;
        font-weight: 400;
      }

      @media (max-width: 900px) {
        .gallery-wrapper {
          gap: 1.5vw;
          padding: 1.5vw;
        }

        .card {
          width: 31vw;
          height: 31vw;
          margin-bottom: 3vw;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="gallery-wrapper">
        <div class="col" id="col1"></div>
        <div class="col" id="col2"></div>
        <div class="col" id="col3"></div>
      </div>
      <h1>Our Gallery</h1>
    </div>

    <script>
      const col1 = document.getElementById("col1");
      const col2 = document.getElementById("col2");
      const col3 = document.getElementById("col3");

      function createCard(seed) {
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.alt = `Gallery ${seed}`;
        img.src = `https://picsum.photos/seed/${seed}/800/800`;

        card.appendChild(img);
        return card;
      }

      // col2 has double items vs col1/col3
      for (let i = 1; i <= 8; i += 1) col1.appendChild(createCard(i));
      for (let i = 9; i <= 24; i += 1) col2.appendChild(createCard(i));
      for (let i = 25; i <= 32; i += 1) col3.appendChild(createCard(i));

      let current = 0;
      let target = 0;
      let col2BaseOffset = col2.scrollHeight / 2;

      // Initial state: middle column starts shifted up
      target = 0;
      current = 0;
      col1.style.transform = "translateY(0px)";
      col2.style.transform = `translateY(${-col2BaseOffset}px)`;
      col3.style.transform = "translateY(0px)";

      function getMaxScroll() {
        const viewportHeight = window.innerHeight;
        const colHeight = Math.max(col1.scrollHeight, col2.scrollHeight, col3.scrollHeight);
        return Math.max(0, colHeight - viewportHeight + 700);
      }

      function clampProgress(v) {
        const maxScroll = getMaxScroll();
        return Math.max(0, Math.min(v, maxScroll));
      }

      function animate() {
        current += (target - current) * 0.08;

        col1.style.transform = `translateY(${-current * 0.6}px)`;
        col2.style.transform = `translateY(${-col2BaseOffset + current * 0.6}px)`;
        col3.style.transform = `translateY(${-current * 0.6}px)`;

        requestAnimationFrame(animate);
      }

      animate();

      window.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();

          target += e.deltaY * 0.8;
          target = clampProgress(target);
          target = Math.max(0, target);
        },
        { passive: false }
      );

      let lastTouchY = 0;
      window.addEventListener(
        "touchstart",
        (e) => {
          if (e.touches.length > 0) lastTouchY = e.touches[0].clientY;
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (e) => {
          if (e.touches.length === 0) return;
          const y = e.touches[0].clientY;
          const deltaY = (lastTouchY - y) * 1.2;
          lastTouchY = y;

          target += deltaY * 0.8;
          target = clampProgress(target);
          target = Math.max(0, target);

          e.preventDefault();
        },
        { passive: false }
      );

      window.addEventListener("resize", () => {
        col2BaseOffset = col2.scrollHeight / 2;
        target = clampProgress(target);
      });
    </script>
  </body>
</html>
